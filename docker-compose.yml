services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: extenddb
      POSTGRES_PASSWORD: extenddb-local-dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extenddb -d extenddb"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy

  extenddb:
    build:
      context: .
      dockerfile: Dockerfile.extenddb
    container_name: extenddb
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "if [ ! -f /app/extenddb.toml ]; then extenddb init --config /app/extenddb.toml --pg-host postgres --pg-port 5432 --pg-user extenddb --pg-pass extenddb-local-dev --data-db extenddb --extenddb-user extenddb --extenddb-pass extenddb-local-dev --bind-addr 0.0.0.0; fi; extenddb migrate --config /app/extenddb.toml --pg-user extenddb --pg-pass extenddb-local-dev --yes; extenddb serve --config /app/extenddb.toml --port 8000; tail -f /dev/null",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6688:8000"
    volumes:
      - extenddb_data:/app
      - extenddb_home:/root/.extenddb

volumes:
  postgres_data:
  extenddb_data:
  extenddb_home: